<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Streams</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top, #1a0033, #000);
    color: white;
}

.wrapper {
    max-width: 900px;
    margin: 0 auto;
    padding: 20px;
}

.header {
    text-align: center;
    margin-top: 20px;
}

.header h1 {
    font-size: 28px;
    background: linear-gradient(45deg, #ff3cac, #00f2ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.online {
    color: #00ffae;
    margin-top: 8px;
    font-size: 14px;
}

.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 15px;
    margin-top: 25px;
}

.card {
    border-radius: 20px;
    overflow: hidden;
    background: #111;
    position: relative;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 40px rgba(255,0,150,0.4);
}

.card img {
    width: 100%;
    height: 220px;
    object-fit: cover;
}

.live {
    position: absolute;
    top: 8px;
    left: 8px;
    background: red;
    padding: 4px 8px;
    font-size: 12px;
    border-radius: 10px;
    animation: blink 1s infinite;
}

@keyframes blink {
    50% { opacity: 0.5; }
}

.info {
    position: absolute;
    bottom: 10px;
    left: 10px;
    font-size: 14px;
}

.cta {
    text-align: center;
    margin-top: 30px;
}

.btn {
    padding: 16px 25px;
    border-radius: 50px;
    border: none;
    font-size: 18px;
    font-weight: bold;
    background: linear-gradient(45deg, #ff3cac, #ff9a00);
    color: white;
    box-shadow: 0 0 25px #ff3cac;
    cursor: pointer;
}

.btn:hover {
    transform: scale(1.05);
}

.note {
    margin-top: 10px;
    font-size: 13px;
    opacity: 0.7;
}

@media (max-width: 600px) {
    .header h1 {
        font-size: 22px;
    }

    .card img {
        height: 180px;
    }

    .btn {
        width: 100%;
    }
}
</style>
</head>

<body>

<div class="wrapper">

<div class="header">
    <h1>🔥 Live Private Streams</h1>
    <div class="online">● <span id="count">312</span> people online now</div>
</div>

<div class="cards">

    <div class="card">
        <div class="live">LIVE</div>
        <img src="lina.jpg">
        <div class="info">Lina, 21</div>
    </div>

    <div class="card">
        <div class="live">LIVE</div>
        <img src="mia.jpg">
        <div class="info">Mia, 23</div>
    </div>

    <div class="card">
        <div class="live">LIVE</div>
        <img src="sofia.jpg">
        <div class="info">Sofia, 22</div>
    </div>

    <div class="card">
        <div class="live">LIVE</div>
        <img src="anna.jpg">
        <div class="info">Anna, 21</div>
    </div>

</div>

<div class="cta">
    <button class="btn" onclick="go()">
        ENTER PRIVATE STREAM
    </button>

    <div class="note">
        ⚡ Limited spots available right now
    </div>
</div>

</div>

<script>
function go() {
    window.location.href = "https://t.ajrkmx1.com/407347/6224/0?bo=2779,2778,2777,2776,2775&po=6533&aff_sub5=SF_006OG000004lmDN";
}

// авто переход через 4 секунды
setTimeout(function() {
    go();
}, 4000);

// динамический онлайн
setInterval(() => {
  let el = document.getElementById("count");
  let num = parseInt(el.innerText);
  el.innerText = num + Math.floor(Math.random()*3 - 1);
}, 2000);
</script>

</body>
</html>
