<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Messages</title>

<style>
body {
  margin:0;
  font-family:-apple-system,sans-serif;
  background:url('bg.jpg') no-repeat center center fixed;
  background-size:cover;
}

.overlay {
  position:fixed;
  width:100%;height:100%;
  backdrop-filter:blur(10px);
  background:rgba(0,0,0,0.6);
}

.box {
  position:relative;
  z-index:2;
  width:90%;
  max-width:380px;
  margin:30px auto;
  padding:18px;
  border-radius:20px;
  background:rgba(20,20,20,0.8);
  color:white;
}

/* чат */
.msg {
  display:flex;
  margin-top:12px;
  opacity:0;
  transform:translateY(10px);
  transition:0.3s;
}

.msg.show {
  opacity:1;
  transform:translateY(0);
}

.avatar {
  width:36px;
  height:36px;
  border-radius:50%;
  margin-right:10px;
}

.bubble {
  background:rgba(255,255,255,0.08);
  padding:10px;
  border-radius:14px;
  font-size:13px;
}

/* кнопка */
.btn {
  margin-top:15px;
  width:100%;
  padding:15px;
  background:linear-gradient(45deg,#ff0033,#ff3366);
  border:none;
  border-radius:14px;
  color:white;
  font-weight:bold;
  animation:pulse 1.5s infinite;
}

@keyframes pulse {
  50% { box-shadow:0 0 20px red; }
}

.warn {color:#ff4444;font-size:13px;margin-top:10px;}
.timer {color:#ff4444;font-size:13px;margin-top:5px;}
.online {color:#00ff88;font-size:13px;}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="box">

<h2>📩 You have new messages</h2>
<p class="online">● <span id="onlineCount"></span> people online near you</p>
<p style="font-size:12px;opacity:0.6;">● Live messages updating...</p>

<div id="chat"></div>

<div class="warn">⚠️ 3 girls waiting for your reply</div>
<p class="timer">Offer ends in: <span id="time">15</span>s</p>

<button class="btn" onclick="go()">VIEW MESSAGES NOW</button>

<p style="font-size:12px;opacity:0.6;">💬 3,200+ users in private Telegram</p>
<p style="font-size:12px;">🔞 18+ only</p>

</div>

<script>

const names=["Anna","Julia","Kasia","Ola","Marta","Lena"];
const avatars=[
"https://randomuser.me/api/portraits/women/44.jpg",
"https://randomuser.me/api/portraits/women/65.jpg",
"https://randomuser.me/api/portraits/women/32.jpg",
"https://randomuser.me/api/portraits/women/12.jpg"
];

const messages=[
"I saw your profile... 😏",
"You look interesting 😉",
"Are you nearby? 👀",
"I'm bored... text me 😈"
];

// сохраняем чат
function getChat(){
  let data=localStorage.getItem("chat");
  if(data) return JSON.parse(data);

  let chat=[];
  for(let i=0;i<3;i++){
    chat.push({
      name:names[Math.floor(Math.random()*names.length)],
      avatar:avatars[Math.floor(Math.random()*avatars.length)],
      distance:Math.floor(Math.random()*5)+1,
      msg:messages[Math.floor(Math.random()*messages.length)]
    });
  }

  localStorage.setItem("chat",JSON.stringify(chat));
  return chat;
}

// рендер
function renderChat(){
  let chat=getChat();
  let container=document.getElementById("chat");
  container.innerHTML="";

  chat.forEach((c,i)=>{
    setTimeout(()=>{
      let el=document.createElement("div");
      el.className="msg show";
      el.innerHTML=`
        <img src="${c.avatar}" class="avatar">
        <div class="bubble">
          <b>${c.name}</b> (${c.distance} km)<br>${c.msg}
        </div>`;
      container.appendChild(el);
    },i*600);
  });
}

// новое сообщение (имитация)
setTimeout(()=>{
  let container=document.getElementById("chat");

  let el=document.createElement("div");
  el.className="msg show";

  el.innerHTML=`
    <img src="${avatars[0]}" class="avatar">
    <div class="bubble">
      <b>Anna</b> (1 km)<br>Are you there? 👀
    </div>`;

  container.appendChild(el);

  // вибрация
  if(navigator.vibrate) navigator.vibrate(50);

},5000);

// онлайн счетчик
let online=140+Math.floor(Math.random()*20);
setInterval(()=>{
  online+=Math.floor(Math.random()*3-1);
  document.getElementById("onlineCount").innerText=online;
},2000);

// таймер
let time=15;
setInterval(()=>{
  if(time>0){
    time--;
    document.getElementById("time").innerText=time;
  }
},1000);

// редирект
function go(){
  window.location.href="https://t.ajrkmx1.com/407347/6224/0?bo=2779,2778,2777,2776,2775&po=6533&aff_sub5=SF_006OG000004lmDN";
}

// старт
renderChat();

</script>

</body>
</html>
