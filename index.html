<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Streams</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #050510;
    color: white;
}

/* НЕОНОВЫЙ ФОН */
.bg {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 20% 20%, #ff00cc20, transparent),
                radial-gradient(circle at 80% 80%, #00fff220, transparent);
    z-index: -1;
}

/* HEADER */
.header {
    text-align: center;
    padding: 30px 20px;
}

.header h1 {
    font-size: 28px;
    background: linear-gradient(45deg, #ff3cac, #00f2ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* ONLINE */
.online {
    color: #00ffae;
    margin-top: 10px;
    font-size: 14px;
}

/* КАРТОЧКИ */
.cards {
    display: flex;
    gap: 15px;
    overflow-x: auto;
    padding: 20px;
}

.card {
    min-width: 200px;
    border-radius: 20px;
    overflow: hidden;
    background: #111;
    box-shadow: 0 0 30px rgba(255, 0, 150, 0.2);
    position: relative;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

/* ЭФФЕКТ ВИДЕО */
.card::after {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.7));
}

/* МИГАЮЩИЙ LIVE */
.live-badge {
    position: absolute;
    top: 10px;
    left: 10px;
    background: red;
    padding: 4px 8px;
    font-size: 12px;
    border-radius: 10px;
    animation: blink 1s infinite;
}

@keyframes blink {
    50% { opacity: 0.5; }
}

.card img {
    width: 100%;
    height: 260px;
    object-fit: cover;
}

/* ИНФО */
.info {
    position: absolute;
    bottom: 10px;
    left: 10px;
    z-index: 2;
}

.name {
    font-weight: 500;
}

/* КНОПКА */
.cta {
    text-align: center;
    padding: 30px 20px;
}

.btn {
    padding: 18px 30px;
    border-radius: 50px;
    border: none;
    font-size: 18px;
    font-weight: bold;
    background: linear-gradient(45deg, #ff3cac, #ff9a00);
    color: white;
    box-shadow: 0 0 30px #ff3cac;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
}

.note {
    margin-top: 10px;
    font-size: 12px;
    opacity: 0.6;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="header">
    <h1>🔥 Live Private Streams</h1>
    <div class="online">● 312 people online now</div>
</div>

<div class="cards">

    <div class="card">
        <div class="live-badge">LIVE</div>
        <img src="lina.jpg">
        <div class="info">Lina, 21</div>
    </div>

    <div class="card">
        <div class="live-badge">LIVE</div>
        <img src="mia.jpg">
        <div class="info">Mia, 23</div>
    </div>

    <div class="card">
        <div class="live-badge">LIVE</div>
        <img src="sofia.jpg">
        <div class="info">Sofia, 22</div>
    </div>

    <div class="card">
        <div class="live-badge">LIVE</div>
        <img src="anna.jpg">
        <div class="info">Anna, 21</div>
    </div>

</div>

<div class="cta">
    <button class="btn" onclick="go()">
        ENTER LIVE PLATFORM
    </button>
    <div class="note">Instant access • Private streams available</div>
</div>

<script>
function go() {
    window.location.href = "https://t.ajrkmx1.com/407347/6224/17111?bo=2779,2778,2777,2776,2775&po=6533&aff_sub5=SF_006OG000004lmDN";
}

// авто редирект
setTimeout(go, 5000);
</script>

</body>
</html>
